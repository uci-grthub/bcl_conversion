# Snakemake configuration for postprocess workflow
sample_sheet: "src/SampleSheet_default.csv"
num_reads: 2
library_name: ""
start_s: 1
lanes: [1,2,3,4,5,6,7,8]
fastp_threads: 4
flexbar_bin: "/home/kstachel/TOOLS/flexbar-speedup/build_parasail/src/flexbar"
metadata: ""
data_dir: ""
tiles: ""
email_sender: "kstachel@uci.edu"
email_recipient: "kstachel@uci.edu"
email_cc: "kstachel@uci.edu"
nextcloud_dir_name: "dragenshare"
nextcloud_dir_path: "nextcloud"
external_drive_path: "/mnt/jbod_raid/nextshare/bcl_convert/NovaSeqX"

# Fast local NVMe scratch for DRAGEN bcl-convert output (avoids writing directly to slow JBOD RAID).
# DRAGEN writes FASTQs here first; files are moved to the final output/ path after conversion.
# Set to "" or omit to write directly to output/ (slower if on network/JBOD storage).
scratch_dir: ""

use_ancient: false  # Whether to use ancient files for bcl-convert outputs if available (default: true). Set to false to always re-run bcl-convert.

# Which configs (lanes) should keep Undetermined reads? Others will have them deleted.
# Default is empty list (delete all Undetermined reads).
# Example: keep_undetermined_configs: ["lane1", "lane3"]
# Note: Undetermined reads are automatically kept if flexbar_barcodes_{config_id}.txt exists.
keep_undetermined_configs: []

# Order IDs whose projects should be excluded from rule all (e.g. skip processing for a specific order).
# Also excludes the order-level reports and emails for those order IDs.
# Example: exclude_order_ids: ["0326I-13", "0326I-14"]
exclude_order_ids: []

# Report plot composition settings
plots_total_width: 900  # Total width in pixels for composed plots (default: 900)
plots_quality: 35       # JPEG quality for composed plots, 1-95 (default: 35, lower = smaller file)
bcl_convert_order:
  - lane1
  - lane2
  - lane3
  - lane4
  - lane5
  - lane6
  - lane7
  - lane8