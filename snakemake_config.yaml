# Snakemake configuration for postprocess workflow
sample_sheet: "src/SampleSheet_default.csv"
num_reads: 2
library_name: ""
start_s: 1
lanes: [1,2,3,4,5,6,7,8]
fastp_threads: 4
metadata: "metadata/default.xlsx"
data_dir: "/staging/nextcloud/NovaseqX/default"
tiles: ""
email_sender: "kstachel@uci.edu"
email_recipient: "kstachel@uci.edu"
email_cc: "kstachel@uci.edu"
nextcloud_dir_name: "Jbod"
nextcloud_dir_path: "nextshare"
external_drive_path: "/mnt/jbod_raid/nextshare/bcl_convert/NovaSeqX"

# Fast local NVMe scratch for DRAGEN bcl-convert output (avoids writing directly to slow JBOD RAID).
# DRAGEN writes FASTQs here first; files are moved to the final output/ path after conversion.
# Set to "" or omit to write directly to output/ (slower if on network/JBOD storage).
scratch_dir: ""

# Report plot composition settings
plots_total_width: 900  # Total width in pixels for composed plots (default: 900)
plots_quality: 35       # JPEG quality for composed plots, 1-95 (default: 35, lower = smaller file)