# Snakemake configuration for postprocess workflow
num_reads: 2
library_name: ""
start_s: 1
lanes: [1,2,3,4,5,6,7,8]
fastp_threads: 4
# flexbar from pixi (see pixi.toml). Override with an absolute path, or the
# FLEXBAR_BIN env var, to use a local speedup build instead.
flexbar_bin: "flexbar"
# Number of leading bases (e.g. a UMI) before the inline barcode in R1. The
# barcode FASTA is built as "<this many N's><barcode>" and matched at the read
# start (LTAIL). 0 = barcode at R1 position 1 (KY26SPI inline libraries). Set to
# 5 for PAREseq-style U5I6 libraries.
flexbar_barcode_leader_n: 5
# If no sample exceeds this many assigned reads after the forward-orientation
# pass, flexbar retries with the reverse-complement indices.
flexbar_retry_min_reads: 1000000
metadata: ""
data_dir: ""
tiles: ""
# Set these per run in snakemake_config_project.yaml (see SOP). Left blank in the
# base config so a fresh clone never silently emails the previous operator.
email_sender: ""
email_recipient: ""
email_cc: ""
nextcloud_dir_name: "dragenshare"
nextcloud_dir_path: "nextcloud"
external_drive_path: "/mnt/jbod_localdisk/nextshare/bcl_convert/NovaSeqX"

# Fast local NVMe scratch for DRAGEN bcl-convert output (avoids writing directly to slow JBOD RAID).
# DRAGEN writes FASTQs here first; files are moved to the final output/ path after conversion.
# Set to "" or omit to write directly to output/ (slower if on network/JBOD storage).
scratch_dir: ""

use_ancient: true  # Whether to use ancient files for bcl-convert outputs if available (default: true). Set to false to always re-run bcl-convert.

# Force CreateFastqForIndexReads=1 in every generated SampleSheet so DRAGEN emits index
# reads as FASTQs (i.e. no index-based demultiplexing). Default: false.
no_demux: false

# Which configs (lanes) should keep Undetermined reads? Others will have them deleted.
# Default is empty list (delete all Undetermined reads).
# Example: keep_undetermined_configs: ["lane1", "lane3"]
# Note: Undetermined reads are automatically kept if flexbar_barcodes_{config_id}.txt exists.
keep_undetermined_configs: []

# Which configs (lanes) should treat Undetermined reads as a normal sample?
# For each listed lane the Undetermined FASTQs are kept, renamed into the lane's
# first project directory (output/{config_id}/{project}/), and flow through the
# standard pipeline: fastp QC, read counts, md5sums, nextcloud links, and the
# per-order HTML report. Membership in this list is the on/off switch per lane.
# Configs listed here are automatically added to keep_undetermined_configs.
# Example: report_undetermined_configs: ["lane1"]
report_undetermined_configs: []

# Order IDs whose projects should be excluded from rule all (e.g. skip processing for a specific order).
# Also excludes the order-level reports and emails for those order IDs.
# Example: exclude_order_ids: ["0326I-13", "0326I-14"]
exclude_order_ids: []

# Report plot composition settings
plots_total_width: 900  # Total width in pixels for composed plots (default: 900)
plots_quality: 35       # JPEG quality for composed plots, 1-95 (default: 35, lower = smaller file)
bcl_convert_order:
  - lane1
  - lane2
  - lane3
  - lane4
  - lane5
  - lane6
  - lane7
  - lane8